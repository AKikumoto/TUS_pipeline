name: mri
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - ants
  - ipykernel
  - jsonschema=4.26.0
  - jupyterlab
  - matplotlib-base
  - numpy=2.3.0
  - pip=26.0.1
  - pyopengl
  - pytest
  - requests
  - setuptools
  - statsmodels
  - pip:
    # SimNIBS-specific win_amd64 wheels (PyPI versions will not work)
    - https://github.com/simnibs/fmm3dpy/releases/download/v1.0.4/fmm3dpy-1.0.4-cp311-cp311-win_amd64.whl
    - https://github.com/simnibs/petsc4py/releases/download/v3.22.2/petsc4py-3.22.2-cp311-cp311-win_amd64.whl
    - https://github.com/oulap/samseg_wheels/releases/download/dev/samseg-0.5a0-cp311-cp311-win_amd64.whl
    - https://github.com/simnibs/cortech/releases/download/v0.1/cortech-0.1-cp311-cp311-win_amd64.whl
    - brainnet@git+https://github.com/simnibs/brainnet@v0.2
    - brainsynth@git+https://github.com/simnibs/brainsynth@v0.1
    - gmsh==4.14.0
    - h5py==3.15.1
    - numba==0.64.0
    - pygpc==0.4.4
    - pyqt5==5.15.11
    - scipy==1.17.1
    - matplotlib>=3.9
    - pandas>=2.0
    - patsy>=1.0
    - statsmodels>=0.14.4
    - torch==2.6.0
    - https://github.com/simnibs/simnibs/releases/download/v4.6.0/simnibs-4.6.0-cp311-cp311-win_amd64.whl
    - antspyx
    - nibabel
    - nilearn
    - nipype
    - pybids
    - templateflow
